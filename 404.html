---
layout: default
title: Página no encontrada
permalink: /404.html
---

<section class="content-section error-page">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
        <div class="error-content mb-12">
            <div class="error-code">404</div>
            <h1 class="error-title"></h1>
            <p class="error-description"></p>
        </div>

        <div id="quote-section" class="quote-container hidden mb-12">
            <p class="quote-intro"></p>
            <blockquote class="quote-text" id="quote-text"></blockquote>
        </div>

    </div>
</section>

<script>
// Obtener el idioma de la URL o de un parámetro de lenguaje
const urlPath = window.location.pathname;
const language = urlPath.includes('/es/') ? 'es' : urlPath.includes('/en/') ? 'en' : 'gl';

// Traducir contenido según el idioma
document.addEventListener('DOMContentLoaded', function() {
    const errorTitle = document.querySelector('.error-title');
    const errorDescription = document.querySelector('.error-description');
    const quoteIntro = document.querySelector('.quote-intro');
    
    // Textos para cada idioma
    const texts = {
        es: {
            title: 'Página no encontrada',
            description: '¡Ups! La página que buscas no existe o ha sido movida a otro lugar.',
            quoteIntro: 'Sin embargo, te dejo una frase de'
        },
        en: {
            title: 'Page not found',
            description: 'Oops! The page you are looking for does not exist or has been moved.',
            quoteIntro: 'However, here\'s a quote from'
        },
        gl: {
            title: 'Páxina non encontrada',
            description: 'Ups! A páxina que buscas non existe ou foi movida a outro lugar.',
            quoteIntro: 'Non obstante, móstroche unha frase de'
        }
    };

    // Asignar los textos según el idioma
    errorTitle.textContent = texts[language].title;
    errorDescription.textContent = texts[language].description;
    quoteIntro.textContent = texts[language].quoteIntro;

    // Cargar una cita aleatoria
    fetch('/assets/quotes.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('quotes.json no encontrado');
            }
            return response.json();
        })
        .then(quotes => {
            if (quotes && quotes.length > 0) {
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                
                document.getElementById('quote-author').textContent = randomQuote.autor;
                document.getElementById('quote-text').textContent = `"${randomQuote.frase}"`;
                document.getElementById('quote-section').classList.remove('hidden');
            }
        })
        .catch(error => {
            console.log('quotes.json no disponible:', error.message);
        });

    // Animación de los elementos
    const elements = document.querySelectorAll('.error-content, .navigation-options, .tech-info');
    elements.forEach((el, index) => {
        setTimeout(() => {
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
        }, index * 200);
    });
});
</script>

<style>

    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 0;
}

.error-content {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
}

.error-code {
    font-size: 8rem;
    font-weight: 900;
    color: var(--accent-color);
    opacity: 0.8;
    margin-bottom: 1rem;
    text-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    
    background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.error-title {
    font-size: 3rem;
    font-weight: bold;
    color: var(--text-color);
    margin-bottom: 1rem;
}

.error-description {
    font-size: 1.25rem;
    color: var(--subtitle-color);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
}

.quote-container {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: 1rem;
    padding: 2rem;
    box-shadow: 0 4px 6px var(--shadow-light);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
    animation: fadeInUp 0.8s ease forwards;
}

.quote-intro {
    font-size: 1.1rem;
    color: var(--text-color);
    margin-bottom: 1rem;
}

.quote-author {
    font-weight: 600;
    color: var(--accent-color);
}

.quote-text {
    font-size: 1.2rem;
    font-style: italic;
    color: var(--text-color);
    margin: 0;
    padding: 1rem 0;
    border-left: 4px solid var(--accent-color);
    padding-left: 1.5rem;
    background: var(--hover-bg);
    border-radius: 0 0.5rem 0.5rem 0;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
